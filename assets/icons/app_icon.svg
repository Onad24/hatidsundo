<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D1B6E"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#00000060"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)" rx="180" ry="180"/>

  <!-- Glow beneath vehicle -->
  <ellipse cx="512" cy="760" rx="300" ry="28" fill="#FFD600" opacity="0.15"/>

  <!-- === TRICYCLE BODY (sidecar/cab) === -->
  <g filter="url(#shadow)">
    <!-- Cab roof -->
    <path d="M220 390 L460 350 L510 390 Z" fill="#FFD600" stroke="#CC9900" stroke-width="4"/>

    <!-- Cab body -->
    <rect x="200" y="390" width="320" height="200" rx="20" fill="#FFD600" stroke="#CC9900" stroke-width="4"/>

    <!-- Cab windshield -->
    <rect x="240" y="405" width="110" height="110" rx="10" fill="#1565C0" opacity="0.9"/>

    <!-- Side window -->
    <rect x="365" y="415" width="110" height="90" rx="8" fill="#1565C0" opacity="0.85"/>

    <!-- Front bumper -->
    <rect x="190" y="570" width="340" height="22" rx="8" fill="#E6B800"/>

    <!-- Cab rear seat detail -->
    <rect x="380" y="440" width="90" height="55" rx="6" fill="#E6B800" opacity="0.6"/>
  </g>

  <!-- === MOTORCYCLE REAR === -->
  <g filter="url(#shadow)">
    <!-- Rear frame/body -->
    <path d="M510 430 L680 420 L720 480 L700 570 L510 590 Z" fill="#FFD600" stroke="#CC9900" stroke-width="4"/>

    <!-- Seat -->
    <ellipse cx="610" cy="430" rx="85" ry="22" fill="#E6B800"/>

    <!-- Handlebar -->
    <rect x="670" y="400" width="18" height="75" rx="8" fill="#CC9900"/>
    <ellipse cx="679" cy="395" rx="22" ry="10" fill="#B38600"/>

    <!-- Headlight -->
    <circle cx="710" cy="480" r="32" fill="#FAFAFA" stroke="#E6B800" stroke-width="5"/>
    <circle cx="710" cy="480" r="18" fill="#FFE566" opacity="0.9"/>
  </g>

  <!-- === WHEELS === -->
  <!-- Front tricycle wheel (left) -->
  <circle cx="280" cy="630" r="80" fill="#1a1a2e" stroke="#CC9900" stroke-width="8"/>
  <circle cx="280" cy="630" r="50" fill="#2a2a4e" stroke="#E6B800" stroke-width="5"/>
  <circle cx="280" cy="630" r="14" fill="#FFD600"/>
  <!-- Spokes -->
  <line x1="280" y1="580" x2="280" y2="680" stroke="#E6B800" stroke-width="4"/>
  <line x1="230" y1="630" x2="330" y2="630" stroke="#E6B800" stroke-width="4"/>
  <line x1="245" y1="595" x2="315" y2="665" stroke="#E6B800" stroke-width="4"/>
  <line x1="315" y1="595" x2="245" y2="665" stroke="#E6B800" stroke-width="4"/>

  <!-- Rear tricycle wheel (right sidecar) -->
  <circle cx="480" cy="630" r="78" fill="#1a1a2e" stroke="#CC9900" stroke-width="8"/>
  <circle cx="480" cy="630" r="48" fill="#2a2a4e" stroke="#E6B800" stroke-width="5"/>
  <circle cx="480" cy="630" r="13" fill="#FFD600"/>
  <line x1="480" y1="582" x2="480" y2="678" stroke="#E6B800" stroke-width="4"/>
  <line x1="432" y1="630" x2="528" y2="630" stroke="#E6B800" stroke-width="4"/>
  <line x1="446" y1="596" x2="514" y2="664" stroke="#E6B800" stroke-width="4"/>
  <line x1="514" y1="596" x2="446" y2="664" stroke="#E6B800" stroke-width="4"/>

  <!-- Motorcycle rear wheel -->
  <circle cx="700" cy="630" r="88" fill="#1a1a2e" stroke="#CC9900" stroke-width="8"/>
  <circle cx="700" cy="630" r="56" fill="#2a2a4e" stroke="#E6B800" stroke-width="5"/>
  <circle cx="700" cy="630" r="15" fill="#FFD600"/>
  <line x1="700" y1="574" x2="700" y2="686" stroke="#E6B800" stroke-width="4"/>
  <line x1="644" y1="630" x2="756" y2="630" stroke="#E6B800" stroke-width="4"/>
  <line x1="660" y1="590" x2="740" y2="670" stroke="#E6B800" stroke-width="4"/>
  <line x1="740" y1="590" x2="660" y2="670" stroke="#E6B800" stroke-width="4"/>

  <!-- === ARROW (direction forward) === -->
  <g opacity="0.95">
    <polygon points="760,490 860,520 760,550 785,520" fill="white"/>
    <!-- Motion lines -->
    <line x1="140" y1="510" x2="200" y2="510" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="120" y1="540" x2="195" y2="540" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="150" y1="480" x2="200" y2="480" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- === CONNECTING BAR (chassis) === -->
  <rect x="195" y="585" width="530" height="18" rx="8" fill="#B38600"/>
</svg>
